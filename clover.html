        <h2>酢漿草：貼近地面的綠色鋪面</h2>
        <p>酢漿草常出現在草地邊緣或土壤較濕的角落。葉片由三枚小葉組成，植株高度低，容易和其他雜草混在一起，需要靠葉形辨認。</p>
        <ul class="observation-list">
          <li>葉形：三枚小葉像心形或圓形，聚在同一個葉柄頂端。</li>
          <li>生長位置：常在草地低處成群分布。</li>
          <li>觀察方式：從葉片排列與高度比較它和周邊植物的差異。</li>
        </ul>
