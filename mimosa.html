        <h1>含羞草：會回應觸碰的小草</h1>
        <p>這次觀察地點在華興池旁靠近步道的草地，土壤略濕，但陽光可以直接照到。含羞草的葉片很細小，左右排列成羽毛狀，用手輕碰時會慢慢合起來，像是在保護自己。它的莖上有細刺，靠近看時可以發現粉紅色絨球狀的小花。記錄時我注意到，同一片草地裡有些葉子張得很開，有些則因為被碰觸或風動而收起。這讓我知道植物雖然不會移動位置，卻會用自己的方式回應環境變化。</p>
