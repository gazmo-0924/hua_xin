        <h1>車前草：葉脈清楚的步道植物</h1>
        <p>車前草的葉片通常貼近地面向外展開，葉脈從基部往葉尖延伸。它常出現在人行步道旁，能適應踩踏較頻繁的環境。</p>
        <ul class="observation-list">
          <li>葉片：橢圓形或長橢圓形，主脈與側脈清楚。</li>
          <li>位置：常在步道旁、草地邊界或泥土裸露處出現。</li>
          <li>辨認重點：低矮、葉脈明顯、葉片由中心向外放射。</li>
        </ul>
