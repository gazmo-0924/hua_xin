    <section class="article-card content-section">
      <h2>岸邊植物觀察</h2>
      <p>這三種植物是原本田野觀察整理出的項目，可作為「生態調查」中岸邊植物觀察的補充案例。</p>
      <a class="button" href="ecology.html">回到生態調查</a>

    <section class="card-grid" aria-label="植物名錄卡片">
      <article class="card">
        <img src="assets/images/species-mimosa.jpg" alt="含羞草羽狀小葉與粉紅色球狀花">
        <div class="card-body">
          <h2>含羞草</h2>
          <p>葉片碰到會閉合，適合觀察植物如何回應外在刺激。</p>

        </div>

      <article class="card">

        <div class="card-body">
          <h2>酢漿草</h2>
          <p>三枚小葉組成葉片，常在低矮草地形成一片綠色鋪面。</p>
          <a class="button" href="clover.html">看觀察筆記</a>
        </div>
