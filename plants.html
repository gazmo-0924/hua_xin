<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>華興池植物名錄</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>華興池植物名錄</h1>
    <p>把池畔草地的觀察資料整理成卡片</p>
  </header>

  <nav class="top-nav" aria-label="主要選單">
    <ul class="menu">
      <li><a href="about.html">關於</a></li>
      <li><a href="pond-map.html">埤塘地圖</a></li>
      <li class="has-submenu">
        <button class="submenu-toggle is-current" type="button" aria-expanded="false">植物觀察</button>
        <ul class="submenu">
          <li><a class="is-current" href="plants.html">植物名錄</a></li>
          <li><a href="mimosa.html">含羞草</a></li>
          <li><a href="clover.html">酢漿草</a></li>
          <li><a href="plantain.html">車前草</a></li>
        </ul>
      </li>
      <li><a href="field-gallery.html">田野照片</a></li>
    </ul>
  </nav>

  <main class="page">
    <section class="card-grid" aria-label="植物名錄卡片">
      <article class="card">
        <img src="assets/images/mimosa-card.png" alt="含羞草在埤塘旁草地生長">
        <div class="card-body">
          <h2>含羞草</h2>
          <p>葉片碰到會閉合，適合觀察植物如何回應外在刺激。</p>
          <a class="button" href="mimosa.html">看觀察筆記</a>
        </div>
      </article>

      <article class="card">
        <img src="assets/images/clover-card.png" alt="酢漿草在濕潤草地上生長">
        <div class="card-body">
          <h2>酢漿草</h2>
          <p>三枚小葉組成葉片，常在低矮草地形成一片綠色鋪面。</p>
          <a class="button" href="clover.html">看觀察筆記</a>
        </div>
      </article>

      <article class="card">
        <img src="assets/images/plantain-card.png" alt="車前草葉片貼近地面展開">
        <div class="card-body">
          <h2>車前草</h2>
          <p>葉脈清楚、貼近地面展開，常出現在步道邊緣。</p>
          <a class="button" href="plantain.html">看觀察筆記</a>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>華興池埤塘期末網頁作業</p>
  </footer>

  <script src="assets/site.js"></script>
